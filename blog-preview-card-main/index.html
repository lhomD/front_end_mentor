<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <!-- <link rel="stylesheet" href="/style.css"> -->
  <title>Frontend Mentor | Blog preview card</title>
  <style>
    /* --------------- Reset ---------------*/
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
  
    /*    
    html {
      color-scheme: light dark;
    }
    */
  
    img,
    picture {
      max-width: 100%;
      display: block;
    }
  
    button,
    input,
    textarea,
    select {
      font: inherit;
    }
  
    a {
      text-decoration: none;
      color: inherit;
    }
  
    /* --------------- End Reset ---------------*/
  
    /* --------------- Root ---------------*/
    :root {
      font-size: 62.5%;
      font-family: "Figtree", sans-serif;
      --White: hsl(0, 0%, 100%);
      --Yellow: hsl(47, 88%, 63%);
      --Gray_500: hsl(0, 0%, 42%);
      --Gray_950: hsl(0, 0%, 7%);
    }
  
    /* --------------- Style ---------------*/
    .wrapper {
      min-height: 100vh;
      min-width: 100vw;
      background-color: var(--Yellow);
      font-size: 1.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 2.4rem;
    }
  
    .container {
      max-width: 38.4rem;
      background-color: var(--White);
      border: 3px solid #111111;
      border-radius: 2rem;
      margin: auto 2.4rem;
      padding: 2.4rem;
      box-shadow: 8px 8px #000;
    }
  
    .container_content img {
      border-radius: 2rem;
      max-width: 100%;
      margin-bottom: 2.4rem;
      width: 100%;
    }
  
    .container_content span {
      background-color: var(--Yellow);
      color: var(--Gray_950);
      font-weight: bolder;
      font-size: 1.2rem;
      padding: 0.4rem 1.2rem;
      border-radius: 0.4rem;
    }
  
    .container_content p:nth-of-type(1) {
      margin: 1.2rem 0;
      font-size: 1.2rem;
      font-weight: 500;
    }
  
    .container_content a {
      font-size: 2rem;
      font-weight: bolder;
      cursor: pointer;
    }
  
    .container_content a:hover {
      color: var(--Yellow);
      transition: color ease-in-out 150ms;
    }
  
    .container_content p:last-child {
      margin: 1.2rem 0 2.4rem;
      color: var(--Gray_500);
      font-size: 1.4rem;
    }
  
    .container_author {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      color: var(--Gray_950);
      font-weight: bolder;
      font-size: 1.4rem;
    }
  
    .container_author img {
      width: 3.2rem;
    }
  
    /* --------------- Footer ---------------*/
    .attribution {
      font-size: 11px;
      text-align: center;
    }
  
    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>

</head>

<body>
  <div class="wrapper" role="main">
    <div class="container" role="banner">
      <div class="container_content">
        <img src="./assets/images/illustration-article.svg" alt="Illustration">
        <span>Learning</span>
        <p>Published21 Dec 2023</p>
        <a>HTML & CSS foundations</a>
        <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class="container_author">
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper Image">
        <span>Greg Hooper</span>
      </div>
    </div>
    <div class="attribution" role="contentinfo">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="https://github.com/lhomD" target="_blank">Ilhom Dadadjanov</a>.
      </div>
  </div>
</body>

</html>
