<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./assets/style.css">
  <title>Frontend Mentor | Social links profile</title>
</head>

<body>
  <div class="wrapper" role="main">
    <div class="wrapper-profile">
      <!-- Profile -->
      <img src="./assets/images/avatar-jessica.jpeg" alt="Avatar Jessica">
      <h1>Jessica Randall</h1>
      <h2>London, United Kingdom</h2>
      <p>"Front-end developer and avid reader."</p>
    </div>
    <!-- BTN's  -->
    <div class="wrapper-btn">
      <input type="button" value="GitHub">
      <input type="button" value="Frontend Mentor">
      <input type="button" value="LinkedIn">
      <input type="button" value="Twitter">
      <input type="button" value="Instagram">
    </div>
  </div>
  <!-- Attribution -->
  <div class="attribution" role="contentinfo">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="https://github.com/lhomD" target="_blank">Ilhom Dadadjanov</a>.
  </div>
</body>

</html>
